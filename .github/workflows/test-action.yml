name: Test Action

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-action-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Test npm lockfile audit
        id: npm-audit
        uses: ./
        with:
          path: tests/fixtures/npm
          fail-on-severity: critical
        continue-on-error: true

      - name: Verify npm outputs
        run: |
          echo "allow: ${{ steps.npm-audit.outputs.allow }}"
          echo "risk: ${{ steps.npm-audit.outputs.risk }}"
          echo "total: ${{ steps.npm-audit.outputs.total }}"
          echo "denied: ${{ steps.npm-audit.outputs.denied }}"

          if [ -z "${{ steps.npm-audit.outputs.total }}" ]; then
            echo "::error::Missing 'total' output from npm audit"
            exit 1
          fi

      - name: Test cargo lockfile audit
        id: cargo-audit
        uses: ./
        with:
          path: tests/fixtures/cargo
          fail-on-severity: critical
        continue-on-error: true

      - name: Verify cargo outputs
        run: |
          echo "allow: ${{ steps.cargo-audit.outputs.allow }}"
          echo "risk: ${{ steps.cargo-audit.outputs.risk }}"
          echo "total: ${{ steps.cargo-audit.outputs.total }}"

          if [ -z "${{ steps.cargo-audit.outputs.total }}" ]; then
            echo "::error::Missing 'total' output from cargo audit"
            exit 1
          fi

      - name: Test auto-detection
        id: autodetect-audit
        uses: ./
        with:
          path: tests/fixtures/npm
          fail-on-severity: off
        continue-on-error: true

      - name: Verify auto-detection worked
        run: |
          if [ -z "${{ steps.autodetect-audit.outputs.risk }}" ]; then
            echo "::error::Auto-detection failed — no risk output"
            exit 1
          fi
          echo "Auto-detection succeeded"

      - name: Test explicit registry
        id: explicit-audit
        uses: ./
        with:
          path: tests/fixtures/npm
          registry: npm
          fail-on-severity: off
        continue-on-error: true

      - name: Verify explicit registry outputs
        run: |
          if [ -z "${{ steps.explicit-audit.outputs.total }}" ]; then
            echo "::error::Missing 'total' output from explicit registry audit"
            exit 1
          fi
          echo "Explicit registry test passed"
