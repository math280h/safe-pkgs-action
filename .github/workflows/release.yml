name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare release asset
        shell: pwsh
        run: |
          $source = "dist/index.js"
          if (!(Test-Path $source)) {
            throw "Expected build output not found: $source"
          }
          Copy-Item $source "safe-pkgs-action.js" -Force

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "safe-pkgs-action.js" --clobber --repo "${{ github.repository }}"

      - name: Bake dist into release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/
          git commit -m "build: compile dist for ${{ github.event.release.tag_name }}"
          git tag -f "${{ github.event.release.tag_name }}"
          git push --force origin "${{ github.event.release.tag_name }}"

      - name: Update major version tag
        run: |
          MAJOR=$(echo "${{ github.event.release.tag_name }}" | grep -oP '^v\d+')
          git tag -f "$MAJOR"
          git push --force origin "$MAJOR"
